<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multiplayer Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-container">
    <h1>Multiplayer Tic Tac Toe</h1>

    <!-- STATUS -->
    <p id="status">Connecting to server...</p>

    <!-- GAME BOARD -->
    <div id="board">
      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>

      <div class="cell"></div>
      <div class="cell"></div>
      <div class="cell"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <button onclick="createGame()">Create Game</button>
    </div>

    <!-- JOIN GAME -->
    <input
      type="text"
      id="gameCode"
      placeholder="Enter Game Code"
      autocomplete="off"
    />

    <div class="controls">
      <button class="secondary" onclick="joinGame()">Join Game</button>
    </div>

    <!-- RESTART GAME -->
    <div class="controls">
      <button class="secondary" onclick="restartGame()">Restart Game</button>
    </div>
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
